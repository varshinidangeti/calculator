<!DOCTYPE html>
<html>
    <title>calculator</title>
    
    <body>
        <form name="form1">
            <input type="text" name="sol"><br><br>
            <input type="button" value="1" onclick="form1.sol.value+='1'">
            <input type="button" value="2" onclick="form1.sol.value+='2'">
            <input type="button" value="3" onclick="form1.sol.value+='3'">
            <input type="button" value="+" onclick="form1.sol.value+='+'">
            <br>
            <br>

            <input type="button" value="4" onclick="form1.sol.value+='4'">
            <input type="button" value="5" onclick="form1.sol.value+='5'">
            <input type="button" value="6" onclick="form1.sol.value+='6'">
            <input type="button" value="-" onclick="form1.sol.value+='-'">
   <br>
<br>
<input type="button" value="7" onclick="form1.sol.value+='7'">
<input type="button" value="8" onclick="form1.sol.value+='8'">
<input type="button" value="9" onclick="form1.sol.value+='9'">
<input type="button" value="*" onclick="form1.sol.value+='*'">
     <br><br>
     <input type="button" value="0" onclick="form1.sol.value+='0'">
     <input type="button" value="/" onclick="form1.sol.value+='/'">
     <input type="button" value="." onclick="form1.sol.value+='.'">
     <input type="button" value="=" onclick="form1.sol.value+=eval(form1.sol.value) ">             
<br>
<br>
<input type = "button" value = "Clear All" onclick = "form1.sol.value = ' ' " id= "clear" >  
  <br>   



     </form>
    </body>
</html>
